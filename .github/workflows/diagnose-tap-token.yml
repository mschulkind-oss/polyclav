name: Diagnose HOMEBREW_TAP_TOKEN

# TEMPORARY — probes the org secret from an Actions runner to debug the
# 401 "Bad credentials" in publish.yml's update-homebrew-tap job.
# Delete once the tap push works.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose HOMEBREW_TAP_TOKEN
        env:
          T: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${T:-}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN is EMPTY at runtime"
            exit 1
          fi
          echo "token length: ${#T}"
          echo "prefix: ${T:0:11}..."
          # whitespace/newline contamination check
          STRIPPED="$(printf '%s' "$T" | tr -d '[:space:]')"
          echo "length after stripping whitespace: ${#STRIPPED}"
          printf 'Bearer auth (as stored): '
          curl -sS -o /dev/null -w '%{http_code}\n' \
               -H "Authorization: Bearer $T" \
               https://api.github.com/repos/mschulkind-oss/homebrew-tap
          printf 'token   auth (as stored): '
          curl -sS -o /dev/null -w '%{http_code}\n' \
               -H "Authorization: token $T" \
               https://api.github.com/repos/mschulkind-oss/homebrew-tap
          printf 'Bearer auth (stripped):  '
          curl -sS -o /dev/null -w '%{http_code}\n' \
               -H "Authorization: Bearer $STRIPPED" \
               https://api.github.com/repos/mschulkind-oss/homebrew-tap
          printf 'user endpoint (stripped): '
          curl -sS -o /dev/null -w '%{http_code}\n' \
               -H "Authorization: Bearer $STRIPPED" \
               https://api.github.com/user
