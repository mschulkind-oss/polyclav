name: Publish to PyPI

# Builds portable, dynamically-linked Linux and macOS wheels and publishes
# both to the same PyPI release, so `uvx polyclav` / `pipx install polyclav`
# work on either platform.
#
# WHY NOT the nix flake (used by ci.yml) for the Linux wheel: a nix build
# bakes /nix/store RUNPATHs into the binary, so it only runs on a nix
# machine. The wheel must resolve its libs the normal way — by SONAME via
# the user's ldconfig (FHS locations) — so build-linux builds on a stock
# Ubuntu runner with apt-provided -dev libs and no rpath. The resulting
# binary runs on any glibc distro (Fedora/Arch/Debian/...) where the user
# has PipeWire/ALSA/lilv installed.
#
# The Linux wheel is tagged manylinux_2_39 (the runner's glibc baseline) but
# depends on the user's system audio libs — it is intentionally NOT
# auditwheel-bundled (no bundling, no static linking). sfizz is optional
# (dlopen'd at runtime, on both platforms), so it is not needed to build and
# not required to run.
#
# build-macos needs none of that: the macOS backend (cpal/CoreAudio) and v1
# macOS patch types (native/SF2/SF3/SFZ) link nothing beyond system
# frameworks — no Homebrew package required at all (see ci-macos.yml, which
# proves this compiles clean with zero `brew install` steps), so the macOS
# wheel is about as close to "just works" as a compiled binary gets.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (no leading v); dry-run, does not publish"
        required: false
        default: "0.0.0.dev0"

permissions:
  contents: read

jobs:
  build-linux:
    # Ubuntu 24.04: glibc 2.39 -> manylinux_2_39. 22.04 is too old — its
    # PipeWire (0.3.48) predates the spa_video_info_raw layout the pipewire-rs
    # 0.10 crate expects, so libspa fails to compile. Verified in a container.
    runs-on: ubuntu-24.04
    env:
      # Stock pipewire-0.3.pc emits -fno-strict-aliasing / -fno-strict-overflow;
      # Go's cgo rejects unknown pkg-config flags unless allowlisted.
      CGO_CFLAGS_ALLOW: "-fno-strict-aliasing|-fno-strict-overflow"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system libraries (apt, FHS-standard locations)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config clang libclang-dev \
            libpipewire-0.3-dev libasound2-dev \
            liblilv-dev lv2-dev libserd-dev libsord-dev libsratom-dev
          # NOT installed on purpose:
          #  - sfizz: optional, dlopen'd at runtime; not needed to build.
          #  - libzix: Ubuntu's lilv 0.24 vendors zix, so `-tags portable`
          #    omits -lzix-0 (see internal/audio/zix_link.go).

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Rust audio-core
        run: cargo build --release --manifest-path audio-core/Cargo.toml

      - name: Build binaries (native cgo, system SONAMEs, no rpath, portable)
        run: |
          mkdir -p dist
          for cmd in polyclav polyclav-components; do
            go build -tags portable -trimpath -ldflags "-s -w" \
              -o "dist/$cmd" "./cmd/$cmd"
          done

      - name: Verify portability (no /nix/store, report dynamic deps)
        run: |
          if readelf -d dist/polyclav | grep -qi 'nix/store'; then
            echo "::error::binary has a /nix/store RUNPATH — not portable"; exit 1
          fi
          echo "dynamic dependencies:"; ldd dist/polyclav || true

      - name: Build wheel
        run: |
          python3 scripts/build_wheel.py \
            --version "${{ steps.ver.outputs.version }}" \
            --platform-tag manylinux_2_39_x86_64 \
            --binary dist/polyclav --binary dist/polyclav-components \
            --readme README.md --output-dir wheelhouse

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: polyclav-wheel-linux
          path: wheelhouse/*.whl

  build-macos:
    # Apple Silicon only for now, matching the same scope call already made
    # for the sfizz builds (build-sfizz-macos.yml) and the PyPI wheel-tag
    # convention: an arm64-tagged wheel is simply not installable on Intel
    # Macs (pip/uv checks the tag), so this is a real platform-coverage gap,
    # not just a missed optimization — a macosx_x86_64 job is a plausible
    # fast-follow, not attempted here to keep this first pass small.
    runs-on: macos-15
    permissions:
      contents: write # to attach the binary tarball to the release, on a real release
    env:
      CGO_ENABLED: "1"
      GOFLAGS: "-mod=mod"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: dtolnay/rust-toolchain@stable

      # Deliberately no `brew install` step — see the workflow-level comment
      # for why the macOS backend needs nothing beyond system frameworks.

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Rust audio-core
        run: cargo build --release --manifest-path audio-core/Cargo.toml

      - name: Build binaries (native cgo, system frameworks only)
        run: |
          mkdir -p dist
          for cmd in polyclav polyclav-components; do
            go build -tags portable -trimpath -ldflags "-s -w" \
              -o "dist/$cmd" "./cmd/$cmd"
          done

      - name: Verify portability (no Homebrew/nix paths, report dynamic deps)
        run: |
          set -euo pipefail
          if otool -L dist/polyclav | grep -Eqi '/opt/homebrew|/usr/local/(Cellar|opt)|/nix/store'; then
            echo "::error::binary links a Homebrew/nix path — not portable, a plain PyPI/Homebrew install won't have it"
            otool -L dist/polyclav
            exit 1
          fi
          echo "dynamic dependencies:"; otool -L dist/polyclav

      - name: Build wheel
        run: |
          python3 scripts/build_wheel.py \
            --version "${{ steps.ver.outputs.version }}" \
            --platform-tag macosx_11_0_arm64 \
            --binary dist/polyclav --binary dist/polyclav-components \
            --readme README.md --output-dir wheelhouse

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: polyclav-wheel-macos
          path: wheelhouse/*.whl

      - name: Archive raw binaries (for the Homebrew tap, not PyPI)
        # A Homebrew formula wants a plain binary tarball, not a wheel --
        # this is a separate artifact from the wheel above for that reason,
        # not a duplication of it.
        run: tar czf dist/polyclav-macos-arm64.tar.gz -C dist polyclav polyclav-components

      - name: Upload binary archive as a release asset
        # Only on a real release -- workflow_dispatch dry runs have no
        # release to attach to. This is what the Homebrew formula's `url`
        # points at.
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/polyclav-macos-arm64.tar.gz \
            --repo "${{ github.repository }}" --clobber

      - name: Upload binary archive as a build artifact
        # For update-homebrew-tap below -- avoids re-fetching the asset it
        # just uploaded (and needing the release to be fully consistent
        # yet) when this job already has the exact bytes in hand.
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: polyclav-macos-tarball
          path: dist/polyclav-macos-arm64.tar.gz

  update-homebrew-tap:
    # mschulkind-oss/homebrew-tap is one shared tap for the whole
    # portfolio (no per-project taps) -- HOMEBREW_TAP_TOKEN is an
    # org-level secret scoped to it. polyclav doesn't use goreleaser (its
    # `brews:` section would write the formula directly on release), so
    # this job does the equivalent by hand: open a PR against the tap
    # with the updated Formula/polyclav.rb, mirroring the "manual PR"
    # path other non-goreleaser projects in the portfolio use. Merge is
    # manual, same as those.
    needs: build-macos
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS binary archive
        uses: actions/download-artifact@v4
        with:
          name: polyclav-macos-tarball
          path: dist

      - name: Compute release info
        id: info
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum dist/polyclav-macos-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "url=https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/polyclav-macos-arm64.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: mschulkind-oss/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Write Formula/polyclav.rb
        # Apple Silicon only, matching the one macOS artifact build-macos
        # actually produces -- an on_linux/Intel block pointing at a
        # binary that doesn't exist would be worse than no formula at all.
        run: |
          cat > tap/Formula/polyclav.rb <<EOF
          # frozen_string_literal: true

          # Maintained by polyclav's .github/workflows/publish.yml -- not
          # hand-edited, and not GoReleaser-generated (polyclav doesn't use
          # goreleaser). Regenerated on every release.
          class Polyclav < Formula
            desc "Live-piano host: MIDI keyboard -> soundfont/plugin synthesis -> CoreAudio"
            homepage "https://github.com/${{ github.repository }}"
            version "${{ steps.info.outputs.version }}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "${{ steps.info.outputs.url }}"
                sha256 "${{ steps.info.outputs.sha256 }}"

                def install
                  bin.install "polyclav"
                  bin.install "polyclav-components"
                end
              else
                odie "polyclav's Homebrew formula only supports Apple Silicon (arm64) for now."
              end
            end

            def caveats
              <<~EOS
                First run needs soundfonts (and SFZ support): run
                  polyclav bootstrap
                before starting polyclav for the first time.
              EOS
            end

            test do
              system "#{bin}/polyclav", "--version"
            end
          end
          EOF

      - name: Open a PR against the tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        working-directory: tap
        run: |
          set -euo pipefail
          VERSION="${{ steps.info.outputs.version }}"
          BRANCH="polyclav-$VERSION"
          git config user.name "polyclav-release-bot"
          git config user.email "actions@github.com"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add Formula/polyclav.rb
          git commit -m "polyclav $VERSION"
          git push origin "$BRANCH"
          if gh pr view "$BRANCH" --repo mschulkind-oss/homebrew-tap >/dev/null 2>&1; then
            echo "PR already open for $BRANCH"
          else
            gh pr create --repo mschulkind-oss/homebrew-tap \
              --head "$BRANCH" \
              --title "polyclav $VERSION" \
              --body "Auto-generated by polyclav's publish.yml for the $VERSION release. macOS arm64 only for now."
          fi

  publish:
    # Only publish on a real release. Uses PyPI Trusted Publishing (OIDC) — no
    # API token. The PyPI publisher for `polyclav` is scoped to the `pypi`
    # GitHub environment, so this job must declare it — the OIDC claim must
    # match (repo mschulkind-oss/polyclav, workflow publish.yml, environment pypi).
    needs: [build-linux, build-macos]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: polyclav-wheel-linux
          path: wheelhouse
      - uses: actions/download-artifact@v4
        with:
          name: polyclav-wheel-macos
          path: wheelhouse
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse
